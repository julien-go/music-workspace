name: E2E

# Golden-path smoke gate before production: runs only on PRs targeting main,
# since main auto-deploys. Feature PRs to develop stay fast (unit + integration).
on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: music_workspace
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: ci
      DB_URL: jdbc:postgresql://localhost:5432/music_workspace
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # Well-formed dummy; the smoke test never calls Cloudinary.
      CLOUDINARY_URL: cloudinary://123456789012345:ci_dummy_secret_abcdefghij@demo

    steps:
      - uses: actions/checkout@v4

      # Fresh throwaway signing key per run — nothing secret-looking committed.
      - name: Generate CI JWT signing key
        run: echo "JWT_SECRET=$(openssl rand -base64 48)" >> "$GITHUB_ENV"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend jar
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

      - name: Start backend
        working-directory: backend
        run: |
          java -jar target/backend-*.jar > backend.log 2>&1 &
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/v3/api-docs > /dev/null; then
              echo "Backend is up"; exit 0
            fi
            sleep 3
          done
          echo "Backend failed to start:"; cat backend.log; exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke test
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
